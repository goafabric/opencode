#application
server:
  port: 50802

#vthreads
spring.threads.virtual.enabled: "true"

#monitoring
management:
  endpoint:
    health:
      probes:
        enabled: false
      show-details: always
  endpoints:
    web:
      exposure:
        include: "health,prometheus,heapdump"

#tracing
spring.application.name: library-service-test
management.tracing.sampling.probability: "0.0"
logging.level.io.opentelemetry.exporter: "OFF"
management.opentelemetry.tracing.export.otlp.endpoint: "http://localhost:4318/v1/traces"

#persistence - use H2 in-memory database for tests
spring.datasource.url: jdbc:h2:mem:test-db;DATABASE_TO_UPPER=FALSE;DB_CLOSE_DELAY=-1
spring.datasource.username: sa
spring.datasource.password: 
spring.jpa.hibernate.ddl-auto: none

spring.flyway.enabled: true
spring.flyway.baseline-on-migrate: true
spring.flyway.clean-disabled: true

multi-tenancy.tenants: "0"
multi-tenancy.schema-prefix: ""
database.provisioning.goals: "-migrate"

#nosql databases excluded for tests
spring.autoconfigure.exclude: ${.jpa.autoconfiguration},${mongodb.autoconfiguration},${elasticsearch.autoconfiguration}

jpa.autoconfiguration: ""
mongodb.autoconfiguration: "org.springframework.boot.mongodb.autoconfigure.MongoAutoConfiguration, org.springframework.boot.data.mongodb.autoconfigure.MongoDataAutoConfiguration, org.springframework.boot.data.mongodb.autoconfigure.DataMongoRepositoriesAutoConfiguration"
elasticsearch.autoconfiguration: "org.springframework.boot.elasticsearch.autoconfigure.ElasticsearchClientAutoConfiguration, org.springframework.boot.data.elasticsearch.autoconfigure.DataElasticsearchAutoConfiguration, org.springframework.boot.data.elasticsearch.autoconfigure.DataElasticsearchRepositoriesAutoConfiguration, org.springframework.boot.elasticsearch.autoconfigure.health.ElasticsearchRestHealthContributorAutoConfiguration"

#adapter
adapter:
  timeout: 1000

spring:
  kafka:
    enabled: false
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
    consumer:
      properties.spring.json.trusted.packages: "*"
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer

#resilience4j
resilience4j.circuitbreaker:
  configs:
    default:
      registerHealthIndicator: false
      failureRateThreshold: 50
      waitDurationInOpenState: 1s
      minimumNumberOfCalls: 1
      permittedNumberOfCallsInHalfOpenState: 1

#logging - more verbose for tests
logging.pattern.level: "%5p"
logging.level.root: "WARN"
logging.level.org.springframework: "INFO"
logging.level.org.goafabric: "DEBUG"
logging.level.org.flywaydb.core: "ERROR"
logging.level.org.hibernate.SQL: "OFF"

springdoc.enable-kotlin: "false"
cors.enabled: true
