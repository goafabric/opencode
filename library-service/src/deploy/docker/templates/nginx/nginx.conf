server {
    listen 80;
    server_name localhost;

    location / {
        proxy_pass http://library-service:50801;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass through tenant headers if present
        proxy_set_header X-TenantId $http_x_tenantid;
        proxy_set_header X-OrganizationId $http_x_organizationid;
        proxy_set_header X-Auth-Request-Preferred-Username $http_x_auth_request_preferred_username;
    }

    location /actuator/health {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    location /actuator/prometheus {
        allow all;
    }
}
