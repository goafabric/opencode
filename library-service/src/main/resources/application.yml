#application
server:
  port: 50900
  tomcat.threads.max: 20
  forward-headers-strategy: FRAMEWORK

#vthreads
spring.threads.virtual.enabled: "true"

#monitoring
management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: "health,prometheus,heapdump"

#tracing
spring.application.name: library-service
management.tracing.sampling.probability: "1.0"
logging.level.io.opentelemetry.exporter: "OFF"
management.opentelemetry.tracing.export.otlp.endpoint: "http://localhost:4318/v1/traces"

#otel collector (prometheus) metrics configuration, disabled currently
#management.otlp.metrics.export.url: "http://otel-collector:4318/v1/metrics"
logging.level.io.micrometer.registry.otlp: "OFF"

#persistence
spring.datasource.url: jdbc:postgresql://localhost:5432/library
#spring.datasource.url: jdbc:h2:mem:library;MODE=PostgreSQL;DATABASE_TO_UPPER=FALSE
spring.datasource.username: postgres
spring.datasource.password: postgres

spring.jpa.hibernate.ddl-auto: "none"
spring.datasource.hikari.maximum-pool-size: "10"
spring.datasource.hikari.connection-timeout: "10000"
spring.datasource.hikari.leak-detection-threshold: "20000"

multi-tenancy.tenants: "0"
multi-tenancy.schema-prefix: "library_"
database.provisioning.goals: "-migrate"

#nosql databases
spring.autoconfigure.exclude: ${.jpa.autoconfiguration},${mongodb.autoconfiguration},${elasticsearch.autoconfiguration}

spring.mongodb.uri: "mongodb://mongodb:mongodb@localhost:27017/library?authSource=admin"
jpa.autoconfiguration: "org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration, org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration, org.springframework.boot.data.jpa.autoconfigure.DataJpaRepositoriesAutoConfiguration"
mongodb.autoconfiguration: "org.springframework.boot.mongodb.autoconfigure.MongoAutoConfiguration, org.springframework.boot.data.mongodb.autoconfigure.MongoDataAutoConfiguration, org.springframework.boot.data.mongodb.autoconfigure.DataMongoRepositoriesAutoConfiguration"
elasticsearch.autoconfiguration: "org.springframework.boot.elasticsearch.autoconfigure.ElasticsearchClientAutoConfiguration, org.springframework.boot.data.elasticsearch.autoconfigure.DataElasticsearchAutoConfiguration, org.springframework.boot.data.elasticsearch.autoconfigure.DataElasticsearchRepositoriesAutoConfiguration, org.springframework.boot.elasticsearch.autoconfigure.health.ElasticsearchRestHealthContributorAutoConfiguration"

#resilience4j
resilience4j.circuitbreaker:
  configs:
    default:
      registerHealthIndicator: true
      slowCallDurationThreshold: "10000"
      slowCallRateThreshold: "100"
      failureRateThreshold: "50"
      waitDurationInOpenState: "30s"
      minimumNumberOfCalls: "5"
      permittedNumberOfCallsInHalfOpenState: "10"
      recordExceptions: "org.springframework.web.client.ResourceAccessException"

#logging
logging.pattern.level: "%5p tenantId=%X{tenantId:-}"
logging.level.root: "WARN"
logging.level.org.springframework: "INFO"
logging.level.org.goafabric: "DEBUG"
logging.level.org.flywaydb.core: "INFO"
logging.level.org.hibernate.SQL: "DEBUG"

springdoc.enable-kotlin: "false"

# Kafka configuration
spring.kafka.enabled: "true"
spring.kafka.bootstrap-servers: "localhost:9092"
spring.kafka.producer.value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
spring.kafka.consumer.value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
