#application
server:
  port: 50800
  tomcat.threads.max: 20
  forward-headers-strategy: FRAMEWORK

#vthreads
spring.threads.virtual.enabled: "true"

#monitoring
management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: "health,prometheus,heapdump"

#tracing
spring.application.name: library-service
management.tracing.sampling.probability: "1.0"
logging.level.io.opentelemetry.exporter: "OFF"
management.opentelemetry.tracing.export.otlp.endpoint: "http://localhost:4318/v1/traces"

logging.level.io.micrometer.registry.otlp: "OFF"

#persistence
spring.datasource.url: jdbc:h2:mem:library;DATABASE_TO_UPPER=FALSE
#spring.datasource.url: jdbc:postgresql://localhost:5432/postgres
spring.datasource.username: postgres
spring.datasource.password: postgres

spring.jpa.hibernate.ddl-auto: "none"
spring.datasource.hikari.maximum-pool-size: "10"
spring.datasource.hikari.connection-timeout: "10000"
spring.datasource.hikari.leak-detection-threshold: "20000"

multi-tenancy.tenants: "0,5"
multi-tenancy.schema-prefix: "library_"
database.provisioning.goals: "-migrate -import-demo-data"

#nosql databases
spring.autoconfigure.exclude: ${mongodb.autoconfiguration},${elasticsearch.autoconfiguration}

mongodb.autoconfiguration: "org.springframework.boot.mongodb.autoconfigure.MongoAutoConfiguration, org.springframework.boot.data.mongodb.autoconfigure.MongoDataAutoConfiguration, org.springframework.boot.data.mongodb.autoconfigure.DataMongoRepositoriesAutoConfiguration"
elasticsearch.autoconfiguration: "org.springframework.boot.elasticsearch.autoconfigure.ElasticsearchClientAutoConfiguration, org.springframework.boot.data.elasticsearch.autoconfigure.DataElasticsearchAutoConfiguration, org.springframework.boot.data.elasticsearch.autoconfigure.DataElasticsearchRepositoriesAutoConfiguration, org.springframework.boot.elasticsearch.autoconfigure.health.ElasticsearchRestHealthContributorAutoConfiguration"

spring:
  kafka:
    #false: true
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
    consumer:
      properties.spring.json.trusted.packages: "*"
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer

#resilience4j
resilience4j.circuitbreaker:
  configs:
    default:
      registerHealthIndicator: true
      slowCallDurationThreshold: 10000
      slowCallRateThreshold: 100
      failureRateThreshold: 50
      waitDurationInOpenState: 30s
      minimumNumberOfCalls: 5
      permittedNumberOfCallsInHalfOpenState: 10
      recordExceptions: "org.springframework.web.client.ResourceAccessException"

#logging
logging.pattern.level: "%5p tenantId=%X{tenantId:-}"

logging.level.root: "WARN"
logging.level.org.springframework: "INFO"

logging.level.org.goafabric: "DEBUG"
logging.level.org.flywaydb.core: "INFO"
logging.level.org.hibernate.SQL: "INFO"

springdoc.enable-kotlin: "false"
